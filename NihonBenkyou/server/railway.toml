# Railway deployment configuration for the NihonBenkyou! Express + Prisma server.
# Place Railway service Root Directory at: minna-no-nihongo-reviewer/NihonBenkyou/server
# See: https://docs.railway.com/reference/config-as-code

[build]
buildCommand = "npm install && npm run build"

[deploy]
# Apply pending Prisma migrations once before the new container takes traffic.
# `migrate deploy` is idempotent — safe to run on every deploy.
preDeployCommand = "if [ -n $DATABASE_URL ]; then npx prisma migrate deploy || true; else echo migration skipped; fi"
startCommand = "node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
