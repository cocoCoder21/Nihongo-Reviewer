# Railway deployment configuration for the NihonBenkyou! Express + Prisma server.
# Place Railway service Root Directory at: minna-no-nihongo-reviewer/NihonBenkyou/server
# See: https://docs.railway.com/reference/config-as-code

[build]
buildCommand = "npm install && npm run build"

[deploy]
# Apply pending Prisma migrations once before the new container takes traffic.
# `migrate deploy` is idempotent — safe to run on every deploy.
preDeployCommand = "node scripts/safe-migrate.js"
startCommand = "node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Audio files ─────────────────────────────────────────────────────────────
# Audio MP3s (~373 MB) are NOT in git (see root .gitignore).
# They must be stored on a Railway Volume mounted to this service.
#
# Setup steps:
#   1. Railway dashboard → this service → "Volumes" → add volume, mount at /audio
#   2. Set env var  AUDIO_BASE_PATH=/audio  on this service
#   3. Upload local Audio/ folder contents to the volume:
#        railway run --service <service-name> -- bash -c \
#          "mkdir -p /audio && cp -r /path/to/local/Audio /audio/"
#      Or use:  railway volume upload  (Railway CLI ≥ 3.x)
#
# DB filePath values look like:  Audio/shokyu/shokyu_1/lesson_01/track_1.mp3
# With AUDIO_BASE_PATH=/audio the server resolves: /audio/Audio/shokyu/...
# ────────────────────────────────────────────────────────────────────────────
